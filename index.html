<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity Web Player | CourseWorkPI-331</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        border: 0;
        width: 100%;
        height: 100%;
        overflow: hidden; 
      }
      
      body {
        position: fixed; 
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #231F20;
      }
      
      #unity-canvas {
        display: block;
        width: 100%;
        height: 100%;
        background: #231F20;
      }
      
      iframe {
        display: block;
      }
    </style>
  </head>
  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>
    
    <script src="Build/Build.loader.js"></script>
    <script src="https://unpkg.com/@vkontakte/vk-bridge@2.15.6/dist/browser.min.js"></script>
    <script>
      const vkBridge = window.vkBridge;
      
      function resizeGame() {
        const canvas = document.querySelector("#unity-canvas");
        if (!canvas) return;
        
        const container = canvas.parentElement;
        const width = container.clientWidth;
        const height = container.clientHeight;
        
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';
        
        if (window.unityInstance) {
          window.unityInstance.SetResolution(width, height);
        }
      }
      
      vkBridge.send('VKWebAppInit').then(() => {
        console.log('VK Bridge initialized');
        
        return vkBridge.send('VKWebAppGetUserInfo');
      }).then((user) => {
        console.log('User info:', user);
        
        vkBridge.send('VKWebAppAllowNotifications');
      }).catch((error) => {
        console.error('VK Bridge error:', error);
      });
      
      window.addEventListener('resize', () => {
        setTimeout(resizeGame, 100); 
      });
      
      vkBridge.subscribe((event) => {
        if (event.type === 'VKWebAppUpdateConfig') {
          console.log('VK config updated', event.detail);
          resizeGame();
        }
      });
      
      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Build.data.unityweb",
        frameworkUrl: "Build/Build.framework.js.unityweb",
        codeUrl: "Build/Build.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "CourseWorkPI-331",
        productVersion: "0.1.0",
      }).then((unityInstance) => {
        window.unityInstance = unityInstance;
        console.log('Unity loaded successfully');
        
        setTimeout(resizeGame, 100);
        
        if (unityInstance.Module && unityInstance.Module.canvas) {
          unityInstance.Module.canvas.addEventListener('click', () => {
            if (unityInstance.Module.canvas.requestPointerLock) {
            }
          });
        }
      }).catch((message) => {
        console.error('Unity load error:', message);
        alert('Ошибка загрузки игры: ' + message);
      });
      
      window.addEventListener('load', () => {
        setTimeout(resizeGame, 200);
      });
      
      if (window.parent !== window) {
        console.log('Running inside VK iframe');
        window.parent.postMessage({ type: 'gameLoaded', status: 'ready' }, '*');
      } else {
        console.log('Running outside VK');
      }
    </script>
  </body>
</html>
